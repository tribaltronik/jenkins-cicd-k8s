jenkins:
  systemMessage: "Jenkins Docker - Pipeline Testing"
  numExecutors: 0
  mode: EXCLUSIVE
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "admin"
          name: "Admin"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false
  disableRememberMe: true

unclassified:
  location:
    url: http://localhost:8080/jenkins